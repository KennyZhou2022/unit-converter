site_name: unit-converter
site_description: Standards-backed Python unit conversion.
site_url: https://kennyzhou2022.github.io/unit-converter/
repo_url: https://github.com/KennyZhou2022/unit-converter
repo_name: KennyZhou2022/unit-converter

theme:
  name: material
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: teal

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Supported Units: supported-units.md
  - API Reference: api-reference.md
  - Errors: errors.md

extra_css:
  - assets/supported-units-filter.css

extra_javascript:
  - assets/supported-units-filter.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
